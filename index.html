<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Center — Support</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --bg-2: #0d0d14;
      --bg-3: #13131e;
      --border: rgba(255,255,255,0.07);
      --primary: #5865F2;
      --primary-light: #7983f5;
      --accent: #06b6d4;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --text: #e2e2ee;
      --text-muted: #5c5c7a;
      --text-dim: #9898b8;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% -10%, rgba(88,101,242,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 85% 105%, rgba(6,182,212,0.09) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; position: relative; z-index: 1; }
    .view.active { display: block; }
    #app-view.active { display: flex !important; flex-direction: column; min-height: 100vh; }

    /* ===== LOGIN ===== */
    #login-view {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      text-align: center;
      max-width: 420px;
      width: 90%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 40px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
    }

    .login-card::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(88,101,242,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-logo {
      width: 76px; height: 76px;
      background: linear-gradient(135deg, rgba(88,101,242,0.2), rgba(6,182,212,0.2));
      border: 1px solid rgba(88,101,242,0.3);
      border-radius: 20px;
      margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
    }

    .login-title {
      font-family: var(--font-mono);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, rgba(255,255,255,0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .btn-discord {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #5865F2;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
      font-family: var(--font-sans);
      letter-spacing: 0.01em;
    }

    .btn-discord:hover {
      background: #4752c4;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(88,101,242,0.35);
    }

    .login-footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== LOADING ===== */
    #loading-view {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== APP ===== */
    #app-view { display: none; min-height: 100vh; }
    #app-view.active { display: flex; flex-direction: column; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: rgba(5,5,8,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .nav-brand-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, rgba(88,101,242,0.3), rgba(6,182,212,0.2));
      border: 1px solid rgba(88,101,242,0.3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .nav-live {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.15);
      padding: 3px 10px;
      border-radius: 100px;
    }

    .live-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
      box-shadow: 0 0 6px var(--accent);
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      padding: 5px 12px 5px 5px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
    }

    .user-pill img {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .staff-badge {
      background: linear-gradient(135deg, var(--primary), #818cf8);
      color: white;
      font-size: 9px;
      font-weight: 700;
      font-family: var(--font-mono);
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }

    .btn-logout:hover { border-color: rgba(239,68,68,0.4); color: var(--red); }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 36px 28px;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 28px;
      width: fit-content;
    }

    .tab {
      padding: 7px 18px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.2s;
      font-family: var(--font-sans);
    }

    .tab.active { background: var(--primary); color: white; }
    .tab:hover:not(.active) { background: var(--bg-3); color: var(--text); }

    /* ===== PAGE HEADER ===== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-title span { color: var(--primary-light); }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(88,101,242,0.3);
    }

    /* ===== TICKETS LIST ===== */
    .tickets-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ticket-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeUp 0.3s ease;
    }

    .ticket-card:hover {
      border-color: rgba(88,101,242,0.25);
      background: rgba(13,13,20,0.9);
      transform: translateX(3px);
    }

    .ticket-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      min-width: 72px;
      background: var(--bg-3);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .ticket-info { flex: 1; min-width: 0; }

    .ticket-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ticket-meta { font-size: 12px; color: var(--text-muted); }

    .ticket-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .ticket-status::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
    }

    .status-open { background: rgba(34,197,94,0.08); color: var(--green); border: 1px solid rgba(34,197,94,0.15); }
    .status-open::before { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .status-in_progress { background: rgba(234,179,8,0.08); color: var(--yellow); border: 1px solid rgba(234,179,8,0.15); }
    .status-in_progress::before { background: var(--yellow); }
    .status-closed { background: rgba(92,92,122,0.08); color: var(--text-muted); border: 1px solid rgba(92,92,122,0.15); }
    .status-closed::before { background: var(--text-muted); }

    .empty-state {
      text-align: center;
      padding: 72px 32px;
      color: var(--text-muted);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

    .empty-state h3 {
      font-family: var(--font-mono);
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--text-dim);
    }

    .empty-state p { font-size: 13px; }

    /* ===== TICKET DETAIL ===== */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: color 0.2s;
      font-family: var(--font-sans);
      padding: 0;
    }

    .back-btn:hover { color: var(--text); }

    .ticket-detail-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .ticket-detail-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(88,101,242,0.4), transparent);
    }

    .ticket-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 16px;
    }

    .ticket-detail-title {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .ticket-detail-body {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .ticket-detail-meta {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .meta-item { display: flex; align-items: center; gap: 6px; }

    .staff-controls {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .staff-controls-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      align-self: center;
      margin-right: 4px;
    }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }

    .btn-status-open { background: rgba(34,197,94,0.08); color: var(--green); border-color: rgba(34,197,94,0.2); }
    .btn-status-open:hover { background: rgba(34,197,94,0.15); }
    .btn-status-wip { background: rgba(234,179,8,0.08); color: var(--yellow); border-color: rgba(234,179,8,0.2); }
    .btn-status-wip:hover { background: rgba(234,179,8,0.15); }
    .btn-status-close { background: rgba(239,68,68,0.08); color: var(--red); border-color: rgba(239,68,68,0.2); }
    .btn-status-close:hover { background: rgba(239,68,68,0.15); }

    /* ===== MESSAGES ===== */
    .messages-section {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .messages-header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .messages-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 380px;
      overflow-y: auto;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.2s ease;
    }

    .message-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .message-content { flex: 1; }

    .message-author {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .author-name { font-weight: 600; font-size: 13px; }

    .message-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .message-input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    .message-input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-sans);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 72px;
    }

    .message-input:focus { border-color: rgba(88,101,242,0.35); }
    .message-input::placeholder { color: var(--text-muted); }

    .message-input-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
      position: relative;
      animation: fadeUp 0.25s ease;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 18px 18px 0 0;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .modal-title {
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
      font-family: var(--font-mono);
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 13px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: rgba(88,101,242,0.4);
      box-shadow: 0 0 0 3px rgba(88,101,242,0.06);
    }

    .form-textarea { resize: vertical; min-height: 100px; }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
    .form-select { appearance: none; cursor: pointer; }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-secondary {
      padding: 10px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-sans);
      transition: all 0.2s;
    }

    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 300px;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(34,197,94,0.25); color: var(--green); }
    #toast.error { border-color: rgba(239,68,68,0.25); color: var(--red); }
    #toast.info { border-color: rgba(88,101,242,0.25); color: var(--primary-light); }

    /* ===== PRIORITY ===== */
    .priority-low { color: var(--green); }
    .priority-medium { color: var(--yellow); }
    .priority-high { color: var(--red); }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .main { padding: 20px 16px; }
      .navbar { padding: 0 16px; }
      .ticket-meta { display: none; }
      .modal { padding: 22px 18px; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-view" class="view active">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="login-card">
      <div class="login-logo">⚡</div>
      <div class="login-title">Dev Center</div>
      <div class="login-subtitle">Connecte-toi avec Discord pour accéder<br>au système de support.</div>

<!-- ===== APP ===== -->
<div id="app-view" class="view">
  <nav class="navbar">

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<script>
// =============================================
//  ⚙️  CONFIG — Remplace ces valeurs !
// =============================================
const SUPABASE_URL     = 'https://llheudregeksbyjuscrw.supabase.co';
const SUPABASE_ANON    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsaGV1ZHJlZ2Vrc2J5anVzY3J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODg1NzUsImV4cCI6MjA4ODU2NDU3NX0.oglo1qODsVra6EdJcrwZ9p2P_SR73R_XfH736V1Giuk';
const CLIENT_ID        = '1480269493447168102';
const REDIRECT_URI     = 'https://jojolm24.github.io/beta-dev/';
const GUILD_ID         = '1452963098284785765';
const STAFF_ROLE_ID    = '1480159806903029822';
// =============================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

let me = null;
let isStaff = false;
let currentTicketId = null;
let currentTab = 'my';

// ---- VIEWS ----
function showView(id) {
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('active');
    v.style.display = 'none';
  });
  const el = document.getElementById(id + '-view');
  el.classList.add('active');
  if (id === 'app') {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.minHeight = '100vh';
  } else if (id === 'loading') {
    el.style.display = 'block';
  } else {
    el.style.display = 'block';
  }
  console.log('showView:', id, '→ display:', el.style.display);
}

function setLoading(msg) {
  showView('loading');
  document.getElementById('loading-text').textContent = msg;
}

// ---- DISCORD LOGIN ----
function loginWithDiscord() {
  // Implicit (token) flow — 100% client-side, pas besoin de backend
  const url = new URL('https://discord.com/api/oauth2/authorize');
  url.searchParams.set('client_id',     CLIENT_ID);
  url.searchParams.set('redirect_uri',  REDIRECT_URI);
  url.searchParams.set('response_type', 'token');
  url.searchParams.set('scope',         'identify guilds.members.read');
  url.searchParams.set('prompt',        'none'); // pas de re-auth si déjà autorisé
  window.location.href = url.toString();
}

async function handleOAuthCallback(token) {
  // Nettoie le hash tout de suite
  history.replaceState(null, '', window.location.pathname);
  setLoading('Connexion à Discord...');

  try {
    // ---- 1. Profil utilisateur ----
    setLoading('Récupération du profil...');
    const uRes = await fetch('https://discord.com/api/v10/users/@me', {
      headers: { Authorization: `Bearer ${token}` }
    });

    const uText = await uRes.text();
    let user;
    try { user = JSON.parse(uText); } catch(e) {
      throw new Error('Réponse Discord invalide: ' + uText.substring(0, 100));
    }

    if (!uRes.ok) {
      throw new Error(`Discord refusé (${uRes.status}): ${user.message || uText}`);
    }
    if (!user.id) throw new Error("Pas d'ID utilisateur dans la reponse Discord");

    // ---- 2. Rôles sur le serveur ----
    setLoading('Vérification des accès...');
    let roles = [];
    try {
      const mRes = await fetch(`https://discord.com/api/v10/users/@me/guilds/${GUILD_ID}/member`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (mRes.ok) {
        const m = await mRes.json();
        roles = m.roles || [];
      } else {
        console.warn('Rôles non récupérables (' + mRes.status + ') — pas de staff');
      }
    } catch (e) {
      console.warn('Fetch rôles échoué:', e.message);
    }

    // ---- 3. Sauvegarde session ----
    me = {
      id:       user.id,
      username: user.global_name || user.username,
      avatar:   user.avatar
        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64`
        : `https://cdn.discordapp.com/embed/avatars/0.png`
    };

    isStaff = roles.includes(STAFF_ROLE_ID);

    sessionStorage.setItem('dc_user',   JSON.stringify(me));
    sessionStorage.setItem('dc_staff',  String(isStaff));
    sessionStorage.setItem('dc_expiry', String(Date.now() + 8 * 3600 * 1000));

    console.log('✅ Connecté:', me.username, '| Staff:', isStaff);
    return true;

  } catch(err) {
    console.error('❌ handleOAuthCallback:', err);
    // Affiche l'erreur à l'écran pour le debug
    setLoading('❌ Erreur : ' + err.message);
    setTimeout(() => showView('login'), 3000);
    return false;
  }
}

function loadSession() {
  const expiry = parseInt(sessionStorage.getItem('dc_expiry') || '0');
  if (Date.now() > expiry) { sessionStorage.clear(); return false; }
  const stored = sessionStorage.getItem('dc_user');
  if (!stored) return false;
  me      = JSON.parse(stored);
  isStaff = sessionStorage.getItem('dc_staff') === 'true';
  return true;
}

function logout() {
  sessionStorage.clear();
  me = null; isStaff = false;
  showView('login');
}

// ---- APP INIT ----
async function init() {
  const hash  = new URLSearchParams(window.location.hash.replace('#', ''));
  const token = hash.get('access_token');
  const err   = hash.get('error');

  if (token) {
    // Retour depuis Discord avec token
    const ok = await handleOAuthCallback(token);
    if (!ok) { showView('login'); return; }
  } else if (err) {
    // Discord a retourné une erreur (ex: utilisateur a refusé)
    history.replaceState(null, '', window.location.pathname);
    showToast('Connexion annulée.', 'error');
    showView('login');
    return;
  } else if (!loadSession()) {
    // Pas de session valide
    showView('login');
    return;
  }

  // Lance l'app
  document.getElementById('user-name').textContent = me.username;
  document.getElementById('user-avatar').src        = me.avatar;

  if (isStaff) {
    document.getElementById('staff-badge').style.display    = 'inline-block';
    document.getElementById('staff-tabs').style.display     = 'flex';
    document.getElementById('staff-controls').style.display = 'flex';
  }

  console.log('🚀 Avant showView app — me=', me, 'isStaff=', isStaff);

  // Force l'affichage de l'app directement
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('active');
    v.style.display = 'none';
  });
  const appEl = document.getElementById('app-view');
  appEl.classList.add('active');
  appEl.style.display = 'flex';
  appEl.style.flexDirection = 'column';
  appEl.style.minHeight = '100vh';

  console.log('✅ app-view display:', appEl.style.display, 'classList:', appEl.className);

  try {
    await loadMyTickets();
    console.log('✅ tickets chargés');
  } catch(e) {
    console.error('❌ loadMyTickets:', e);
    document.getElementById('list-my').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Erreur Supabase</h3><p>${e.message}</p></div>`;
  }
}

// ---- TABS ----
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-my').classList.toggle('active', tab === 'my');
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('view-my').style.display     = tab === 'my'  ? 'block' : 'none';
  document.getElementById('view-all').style.display    = tab === 'all' ? 'block' : 'none';
  document.getElementById('view-detail').style.display = 'none';
  if (tab === 'all') loadAllTickets(); else loadMyTickets();
}

// ---- LOAD TICKETS ----
async function loadMyTickets() {
  const el = document.getElementById('list-my');
  el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);font-family:var(--font-mono);font-size:13px;">Chargement...</div>`;
  const { data, error } = await db.from('tickets').select('*').eq('discord_user_id', me.id).order('created_at', { ascending: false });
  if (error) throw new Error(error.message);
  renderList('list-my', data || [], false);
}

async function loadAllTickets() {
  const { data } = await db.from('tickets').select('*').order('created_at', { ascending: false });
  renderList('list-all', data || [], true);
}

function renderList(containerId, tickets, showAuthor) {
  const el = document.getElementById(containerId);
  if (!tickets.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎫</div><h3>Aucun ticket</h3><p>Aucun ticket pour l'instant.</p></div>`;
    return;
  }
  el.innerHTML = tickets.map(t => `
    <div class="ticket-card" onclick="openTicket('${t.id}')">
      <div class="ticket-id">#${t.id.substring(0,6).toUpperCase()}</div>
      <div class="ticket-info">
        <div class="ticket-title">${esc(t.title)}</div>
        <div class="ticket-meta">
          ${showAuthor ? `👤 ${esc(t.username)} · ` : ''}🕐 ${fmtDate(t.created_at)} · 🔥 <span class="priority-${t.priority}">${prioLabel(t.priority)}</span>
        </div>
      </div>
      <div class="ticket-status status-${t.status}">${statusLabel(t.status)}</div>
    </div>
  `).join('');
}

// ---- TICKET DETAIL ----
async function openTicket(id) {
  currentTicketId = id;
  const { data: t } = await db.from('tickets').select('*').eq('id', id).single();
  if (!t) return;

  document.getElementById('view-my').style.display     = 'none';
  document.getElementById('view-all').style.display    = 'none';
  document.getElementById('view-detail').style.display = 'block';

  document.getElementById('detail-title').textContent      = t.title;
  document.getElementById('detail-body').textContent       = t.description;
  document.getElementById('detail-author').textContent     = t.username;
  document.getElementById('detail-date').textContent       = fmtDate(t.created_at);
  document.getElementById('detail-priority').innerHTML     = `<span class="priority-${t.priority}">${prioLabel(t.priority)}</span>`;
  document.getElementById('detail-status-badge').innerHTML = `<div class="ticket-status status-${t.status}">${statusLabel(t.status)}</div>`;

  // Hide input if closed and not staff
  document.getElementById('message-input-area').style.display = (t.status === 'closed' && !isStaff) ? 'none' : 'block';

  await loadMessages(id);
}

function closeDetail() {
  document.getElementById('view-detail').style.display = 'none';
  if (currentTab === 'all') { document.getElementById('view-all').style.display = 'block'; }
  else                       { document.getElementById('view-my').style.display  = 'block'; }
}

// ---- MESSAGES ----
async function loadMessages(ticketId) {
  const { data } = await db.from('ticket_messages').select('*').eq('ticket_id', ticketId).order('created_at', { ascending: true });
  const el = document.getElementById('messages-list');

  if (!data || !data.length) {
    el.innerHTML = `<div style="text-align:center;padding:28px;color:var(--text-muted);font-size:13px;font-family:var(--font-mono);">// Aucune réponse pour l'instant</div>`;
    return;
  }

  el.innerHTML = data.map(m => `
    <div class="message">
      <img class="message-avatar" src="${m.avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="">
      <div class="message-content">
        <div class="message-author">
          <span class="author-name">${esc(m.username)}</span>
          ${m.is_staff ? '<span class="staff-badge">STAFF</span>' : ''}
          <span class="message-time">${fmtDate(m.created_at)}</span>
        </div>
        <div class="message-text">${esc(m.content)}</div>
      </div>
    </div>
  `).join('');

  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const content = document.getElementById('message-input').value.trim();
  if (!content) return;

  const { error } = await db.from('ticket_messages').insert({
    ticket_id:       currentTicketId,
    discord_user_id: me.id,
    username:        me.username,
    avatar_url:      me.avatar,
    content,
    is_staff:        isStaff
  });

  if (error) { showToast('Erreur lors de l\'envoi.', 'error'); return; }

  document.getElementById('message-input').value = '';
  await loadMessages(currentTicketId);
  showToast('Message envoyé !', 'success');
}

// ---- CREATE TICKET ----
function openCreateModal() {
  document.getElementById('create-modal').classList.add('active');
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('active');
  document.getElementById('t-title').value    = '';
  document.getElementById('t-desc').value     = '';
  document.getElementById('t-priority').value = 'medium';
}

async function createTicket() {
  const title       = document.getElementById('t-title').value.trim();
  const description = document.getElementById('t-desc').value.trim();
  const priority    = document.getElementById('t-priority').value;

  if (!title || !description) { showToast('Remplis tous les champs !', 'error'); return; }

  const { error } = await db.from('tickets').insert({
    discord_user_id: me.id,
    username:        me.username,
    avatar_url:      me.avatar,
    title, description, priority,
    status: 'open'
  });

  if (error) { showToast('Erreur lors de la création.', 'error'); return; }

  closeCreateModal();
  showToast('Ticket créé ✅', 'success');
  loadMyTickets();
}

// ---- STAFF: UPDATE STATUS ----
async function updateStatus(status) {
  if (!isStaff || !currentTicketId) return;

  const { error } = await db.from('tickets').update({ status, updated_at: new Date().toISOString() }).eq('id', currentTicketId);
  if (error) { showToast('Erreur mise à jour.', 'error'); return; }

  showToast(`Statut : ${statusLabel(status)}`, 'success');
  document.getElementById('detail-status-badge').innerHTML = `<div class="ticket-status status-${status}">${statusLabel(status)}</div>`;
  document.getElementById('message-input-area').style.display = (status === 'closed' && !isStaff) ? 'none' : 'block';

  if (currentTab === 'all') loadAllTickets(); else loadMyTickets();
}

// ---- HELPERS ----
function statusLabel(s) { return { open: 'Ouvert', in_progress: 'En cours', closed: 'Fermé' }[s] || s; }
function prioLabel(p)   { return { low: 'Faible', medium: 'Moyenne', high: 'Haute' }[p] || p; }

function fmtDate(d) {
  return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function esc(t) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(t || ''));
  return d.innerHTML;
}

let _toast;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(_toast);
  _toast = setTimeout(() => { t.className = ''; }, 3000);
}

// ---- START ----
init();
</script>
